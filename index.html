<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Influencer Intel</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --bg2: #f2f1ee;
      --bg3: #e8e7e3;
      --text: #1a1a18;
      --text2: #5a5a56;
      --text3: #9a9a94;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --win: #3B6D11;
      --win-bg: #EAF3DE;
      --ok: #854F0B;
      --ok-bg: #FAEEDA;
      --lose: #A32D2D;
      --lose-bg: #FCEBEB;
      --blue: #185FA5;
      --blue-bg: #E6F1FB;
      --purple: #534AB7;
      --purple-bg: #EEEDFE;
      --radius: 10px;
      --radius-sm: 6px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #181816;
        --bg2: #222220;
        --bg3: #2c2c28;
        --text: #f0f0ec;
        --text2: #a0a09a;
        --text3: #606058;
        --border: rgba(255,255,255,0.08);
        --border2: rgba(255,255,255,0.14);
        --win: #97C459;
        --win-bg: #173404;
        --ok: #EF9F27;
        --ok-bg: #412402;
        --lose: #F09595;
        --lose-bg: #501313;
        --blue: #85B7EB;
        --blue-bg: #042C53;
        --purple: #AFA9EC;
        --purple-bg: #26215C;
      }
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding-bottom: 1.25rem;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 2rem;
    }

    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .header .sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); letter-spacing: 0.05em; }

    .config-bar {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .config-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); letter-spacing: 0.05em; white-space: nowrap; }

    input[type=text], input[type=password], input[type=url] {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 8px 12px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      outline: none;
      width: 100%;
    }

    input:focus { border-color: var(--text3); }

    .btn {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 20px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border2);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn:hover { background: var(--bg2); }
    .btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn.primary:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .input-row { display: flex; gap: 10px; margin-bottom: 1.5rem; align-items: center; }
    .input-row input { flex: 1; }

    .status-bar {
      display: none;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text2);
      background: var(--bg2);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-bottom: 1.5rem;
      align-items: center;
      gap: 10px;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
    .dot.active { background: var(--win); animation: pulse 1.2s infinite; }
    .dot.done { background: var(--win); }
    .dot.error { background: var(--lose); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    .creator-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .creator-top {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 1rem;
      margin-bottom: 1rem;
      border-bottom: 0.5px solid var(--border);
    }

    .avatar {
      width: 50px; height: 50px; border-radius: 50%;
      background: var(--blue-bg);
      color: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; flex-shrink: 0;
    }

    .creator-name { font-size: 17px; font-weight: 700; }
    .creator-handle { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); margin-top: 3px; }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 1rem;
    }

    .metric {
      background: var(--bg2);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
    }

    .metric-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }
    .metric-val { font-size: 22px; font-weight: 700; }
    .metric-val.win { color: var(--win); }
    .metric-val.ok { color: var(--ok); }
    .metric-val.lose { color: var(--lose); }

    .wol-bar { display: flex; height: 5px; border-radius: 3px; overflow: hidden; gap: 2px; }
    .wol-seg { border-radius: 3px; }

    .tabs {
      display: flex;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .tab {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 8px 18px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text3);
      cursor: pointer;
      margin-bottom: -0.5px;
    }

    .tab.active { color: var(--text); border-bottom-color: var(--text); }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }

    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 4px 14px;
      border-radius: 20px;
      border: 0.5px solid var(--border2);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
    }

    .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .filter-btn.win-f.active { background: var(--win); border-color: var(--win); color: var(--win-bg); }
    .filter-btn.ok-f.active { background: var(--ok); border-color: var(--ok); color: var(--ok-bg); }
    .filter-btn.lose-f.active { background: var(--lose); border-color: var(--lose); color: var(--lose-bg); }

    .table-wrap {
      overflow-x: auto;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    th {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 10px 14px;
      text-align: left;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg2);
      font-weight: 400;
      white-space: nowrap;
    }

    td {
      padding: 10px 14px;
      border-bottom: 0.5px solid var(--border);
      vertical-align: top;
      color: var(--text);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg2); }

    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 2px 9px;
      border-radius: 10px;
      font-weight: 500;
      white-space: nowrap;
    }

    .badge.win { background: var(--win-bg); color: var(--win); }
    .badge.ok { background: var(--ok-bg); color: var(--ok); }
    .badge.lose { background: var(--lose-bg); color: var(--lose); }
    .badge.sponsored { background: var(--blue-bg); color: var(--blue); }
    .badge.organic { background: var(--bg2); color: var(--text3); }
    .badge.genre { background: var(--purple-bg); color: var(--purple); }

    .mono { font-family: 'DM Mono', monospace; font-size: 12px; }
    .muted { color: var(--text3); font-size: 12px; }
    .summary { font-size: 12px; color: var(--text2); line-height: 1.5; }
    .hook { font-size: 11px; color: var(--text3); font-style: italic; line-height: 1.4; margin-top: 4px; }

    .export-row { display: flex; gap: 8px; margin-top: 1.25rem; justify-content: flex-end; }

    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text3);
    }

    .empty-icon { font-size: 36px; margin-bottom: 1rem; opacity: 0.3; }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 0.75rem;
      margin-top: 1.5rem;
    }

    .insight-chips { display: flex; flex-wrap: wrap; gap: 8px; }

    .chip {
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 0.5px solid var(--border2);
      color: var(--text2);
    }

    .top-reel {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 0.5px solid var(--border);
      align-items: flex-start;
    }

    .top-reel:last-child { border-bottom: none; }

    .rank { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); min-width: 22px; padding-top: 2px; }

    .proxy-field { display: flex; gap: 8px; align-items: center; flex: 1; min-width: 220px; }
    .proxy-field input { flex: 1; }

    a.ig-link { color: var(--blue); font-size: 11px; font-family: 'DM Mono', monospace; text-decoration: none; }
    a.ig-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Influencer Intel</h1>
    <span class="sub">content analysis engine</span>
  </div>

  <div class="config-bar">
    <div class="proxy-field">
      <span class="config-label">PROXY URL</span>
      <input type="url" id="proxyUrl" placeholder="https://your-project.vercel.app" />
    </div>
    <div class="proxy-field">
      <span class="config-label">ANTHROPIC KEY</span>
      <input type="password" id="anthropicKey" placeholder="sk-ant-xxxxxxxxxxxx" />
    </div>
    <button class="btn" onclick="saveConfig()">Save</button>
  </div>

  <div class="input-row">
    <input type="url" id="igUrl" placeholder="https://www.instagram.com/kushakapila/" />
    <button class="btn primary" id="analyseBtn" onclick="startAnalysis()">Analyse →</button>
  </div>

  <div class="status-bar" id="statusBar">
    <span class="dot" id="statusDot"></span>
    <span id="statusText"></span>
  </div>

  <div id="results" style="display:none">
    <div class="creator-card" id="creatorCard"></div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('content', this)">Content table</button>
      <button class="tab" onclick="showTab('insights', this)">Insights</button>
    </div>

    <div id="tab-content">
      <div class="filters" id="filterBar"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="min-width:220px">Summary / hook</th>
              <th>Genre</th>
              <th>Views</th>
              <th>Range</th>
              <th>Result</th>
              <th>Tone</th>
              <th>Type</th>
              <th>Date</th>
              <th>Dur.</th>
              <th>CTA</th>
              <th>Link</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="export-row">
        <button class="btn" onclick="exportCSV()">Export CSV</button>
        <button class="btn" onclick="exportJSON()">Export JSON</button>
      </div>
    </div>

    <div id="tab-insights" style="display:none">
      <div id="insightsContent"></div>
    </div>
  </div>

  <div id="emptyState" class="empty">
    <div class="empty-icon">◎</div>
    <div style="font-size:15px; margin-bottom:6px;">Paste an Instagram profile URL above</div>
    <div class="muted">Fetches last 6 months of reels via Apify · AI analysis via Claude</div>
  </div>

  <script>
    let allPosts = [];
    let creatorData = {};

    function saveConfig() {
      localStorage.setItem('ii_proxy', document.getElementById('proxyUrl').value.trim().replace(/\/$/, ''));
      localStorage.setItem('ii_anthropic', document.getElementById('anthropicKey').value.trim());
      setStatus('done', 'Configuration saved');
      setTimeout(() => document.getElementById('statusBar').style.display = 'none', 2000);
    }

    function loadConfig() {
      const p = localStorage.getItem('ii_proxy') || '';
      const a = localStorage.getItem('ii_anthropic') || '';
      if (p) document.getElementById('proxyUrl').value = p;
      if (a) document.getElementById('anthropicKey').value = a;
    }

    loadConfig();

    function getProxy() { return localStorage.getItem('ii_proxy') || document.getElementById('proxyUrl').value.trim().replace(/\/$/, ''); }
    function getAnthropic() { return localStorage.getItem('ii_anthropic') || document.getElementById('anthropicKey').value.trim(); }

    function setStatus(state, msg) {
      const bar = document.getElementById('statusBar');
      bar.style.display = 'flex';
      document.getElementById('statusDot').className = 'dot ' + state;
      document.getElementById('statusText').textContent = msg;
    }

    function fmtViews(n) {
      if (!n && n !== 0) return '—';
      if (n >= 10000000) return (n / 1000000).toFixed(1) + 'Cr';
      if (n >= 100000) return Math.round(n / 100000) + 'L';
      if (n >= 1000) return Math.round(n / 1000) + 'K';
      return n.toString();
    }

    function getViewRange(v) {
      if (v < 50000) return '<50K';
      if (v < 100000) return '50K–1L';
      if (v < 150000) return '1L–1.5L';
      if (v < 200000) return '1.5L–2L';
      if (v < 500000) return '2L–5L';
      if (v < 1000000) return '5L–10L';
      if (v < 2000000) return '10L–20L';
      if (v < 5000000) return '20L–50L';
      return '50L+';
    }

    function getWOL(views, followers) {
      const r = views / (followers || 1);
      if (r >= 0.10) return 'win';
      if (r >= 0.06) return 'ok';
      return 'lose';
    }

    function extractUsername(url) {
      const m = url.match(/instagram\.com\/([^/?#]+)/);
      return m ? m[1] : url.replace('@', '');
    }

    async function startAnalysis() {
      const url = document.getElementById('igUrl').value.trim();
      const proxy = getProxy();
      const anthropicKey = getAnthropic();

      if (!url) return setStatus('error', 'Please enter an Instagram URL');
      if (!proxy) return setStatus('error', 'Proxy URL required — deploy to Vercel first');
      if (!anthropicKey) return setStatus('error', 'Anthropic API key required');

      document.getElementById('analyseBtn').disabled = true;
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('results').style.display = 'none';

      try {
        const username = extractUsername(url);

        // Start scraper
        setStatus('active', 'Starting Apify scraper...');
        const startRes = await fetch(`${proxy}/api/scrape-start`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });
        if (!startRes.ok) throw new Error('Proxy error: ' + await startRes.text());
        const { runId } = await startRes.json();

        // Poll until done
        setStatus('active', 'Scraper running — this takes 1–3 minutes...');
        await pollUntilDone(runId, proxy);

        // Fetch results
        setStatus('active', 'Fetching results...');
        const resultsRes = await fetch(`${proxy}/api/scrape-results?runId=${runId}`);
        if (!resultsRes.ok) throw new Error(await resultsRes.text());
        const { profile, reels } = await resultsRes.json();

        setStatus('active', `Got ${reels.length} reels — running Claude analysis...`);
        const analysed = await analyseWithClaude(reels, profile.followersCount, anthropicKey);

        allPosts = analysed;
        creatorData = { ...profile, username };

        renderResults();
        setStatus('done', `Done — ${reels.length} reels analysed for @${username}`);

      } catch (err) {
        setStatus('error', 'Error: ' + err.message);
        console.error(err);
      }

      document.getElementById('analyseBtn').disabled = false;
    }

    async function pollUntilDone(runId, proxy) {
      for (let i = 0; i < 72; i++) {
        await new Promise(r => setTimeout(r, 5000));
        const r = await fetch(`${proxy}/api/scrape-status?runId=${runId}`);
        const d = await r.json();
        setStatus('active', `Apify: ${d.status}... (${Math.round((i + 1) * 5)}s elapsed)`);
        if (d.status === 'SUCCEEDED') return;
        if (['FAILED', 'ABORTED', 'TIMED-OUT'].includes(d.status)) throw new Error('Apify run ' + d.status);
      }
      throw new Error('Timed out after 6 minutes');
    }

    async function analyseWithClaude(posts, followers, anthropicKey) {
      const results = [];
      const batchSize = 5;

      for (let i = 0; i < posts.length; i += batchSize) {
        const batch = posts.slice(i, i + batchSize);
        setStatus('active', `Claude analysing ${i + 1}–${Math.min(i + batchSize, posts.length)} of ${posts.length}...`);

        const prompt = `You are a content analyst specialising in Instagram creator performance. Analyse these reels and return ONLY a valid JSON array — no markdown, no explanation, no preamble.

Posts:
${JSON.stringify(batch.map(p => ({
  id: p.id,
  caption: p.caption,
  videoPlayCount: p.videoPlayCount,
  likesCount: p.likesCount,
  commentsCount: p.commentsCount,
  timestamp: p.timestamp,
  videoDuration: p.videoDuration,
  hashtags: p.hashtags,
  isPaidPartnership: p.isPaidPartnership
})), null, 2)}

Return an array where each object has:
- id: string (same as input)
- genre: one of [comedy, lifestyle, fashion, commentary, travel, food, beauty, fitness, motivation, entertainment, collab, other]
- hookSummary: 1 sentence — what the opening hook likely does
- messageSummary: 2 sentences max — core message or narrative
- emotionalTone: one of [funny, emotional, aspirational, informative, relatable, dramatic, educational, entertaining]
- ctaPresent: boolean
- ctaType: one of [follow, comment, link-in-bio, swipe, share, none]
- isSponsored: boolean
- format: one of [talking-head, montage, voiceover, trending-audio, original-audio, transition, tutorial]
- views: number
- likes: number
- comments: number
- timestamp: string
- duration: number

Return ONLY the JSON array.`;

        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': anthropicKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 4000,
            messages: [{ role: 'user', content: prompt }]
          })
        });

        if (!res.ok) throw new Error('Claude API: ' + await res.text());
        const data = await res.json();
        const text = data.content[0].text.replace(/```json|```/g, '').trim();

        try {
          const parsed = JSON.parse(text);
          results.push(...parsed.map(p => ({
            ...p,
            wol: getWOL(p.views || 0, followers),
            viewRange: getViewRange(p.views || 0),
            url: posts.find(r => r.id === p.id)?.url || ''
          })));
        } catch (e) {
          console.warn('Parse error batch', i, e);
        }
      }

      return results;
    }

    function renderResults() {
      document.getElementById('results').style.display = 'block';
      renderCreatorCard();
      renderFilterBar();
      renderTable(allPosts);
      renderInsights();
    }

    function renderCreatorCard() {
      const d = creatorData;
      const total = allPosts.length || 1;
      const wins = allPosts.filter(p => p.wol === 'win').length;
      const oks = allPosts.filter(p => p.wol === 'ok').length;
      const loses = allPosts.filter(p => p.wol === 'lose').length;
      const winPct = Math.round(wins / total * 100);
      const okPct = Math.round(oks / total * 100);
      const losePct = Math.round(loses / total * 100);
      const avgViews = Math.round(allPosts.reduce((s, p) => s + (p.views || 0), 0) / total);
      const winPosts = allPosts.filter(p => p.wol === 'win');
      const avgWinViews = winPosts.length ? Math.round(winPosts.reduce((s, p) => s + (p.views || 0), 0) / winPosts.length) : 0;
      const initials = (d.fullName || d.username || 'XX').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      const sponsoredCount = allPosts.filter(p => p.isSponsored).length;

      document.getElementById('creatorCard').innerHTML = `
        <div class="creator-top">
          <div class="avatar">${initials}</div>
          <div style="flex:1">
            <div class="creator-name">${d.fullName || d.username}${d.isVerified ? ' ✓' : ''}</div>
            <div class="creator-handle">@${d.username} · ${fmtViews(d.followersCount)} followers</div>
          </div>
          <div style="text-align:right">
            <div class="muted">Reels analysed</div>
            <div style="font-size:22px; font-weight:700; margin-top:2px">${total}</div>
          </div>
        </div>
        <div class="metrics-grid">
          <div class="metric"><div class="metric-label">Win rate</div><div class="metric-val win">${winPct}%</div></div>
          <div class="metric"><div class="metric-label">OK rate</div><div class="metric-val ok">${okPct}%</div></div>
          <div class="metric"><div class="metric-label">Lose rate</div><div class="metric-val lose">${losePct}%</div></div>
          <div class="metric"><div class="metric-label">Avg views</div><div class="metric-val">${fmtViews(avgViews)}</div></div>
          <div class="metric"><div class="metric-label">Win avg views</div><div class="metric-val">${fmtViews(avgWinViews)}</div></div>
          <div class="metric"><div class="metric-label">Sponsored reels</div><div class="metric-val">${sponsoredCount}</div></div>
        </div>
        <div class="wol-bar">
          <div class="wol-seg" style="width:${winPct}%; background:var(--win)"></div>
          <div class="wol-seg" style="width:${okPct}%; background:var(--ok)"></div>
          <div class="wol-seg" style="width:${losePct}%; background:var(--lose)"></div>
        </div>`;
    }

    function renderFilterBar() {
      document.getElementById('filterBar').innerHTML = `
        <button class="filter-btn active" onclick="applyFilter('all',this)">All</button>
        <button class="filter-btn win-f" onclick="applyFilter('win',this)">Win</button>
        <button class="filter-btn ok-f" onclick="applyFilter('ok',this)">OK</button>
        <button class="filter-btn lose-f" onclick="applyFilter('lose',this)">Lose</button>
        <button class="filter-btn" onclick="applyFilter('sponsored',this)">Sponsored</button>
        <button class="filter-btn" onclick="applyFilter('organic',this)">Organic</button>`;
    }

    function applyFilter(f, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
      if (btn) { btn.classList.add('active'); if (['win','ok','lose'].includes(f)) btn.classList.add(f+'-f'); }
      const map = { win: p => p.wol==='win', ok: p => p.wol==='ok', lose: p => p.wol==='lose', sponsored: p => p.isSponsored, organic: p => !p.isSponsored };
      renderTable(f === 'all' ? allPosts : allPosts.filter(map[f]));
    }

    function renderTable(posts) {
      const body = document.getElementById('tableBody');
      if (!posts.length) {
        body.innerHTML = '<tr><td colspan="11" style="text-align:center; padding:2rem; color:var(--text3)">No posts match this filter</td></tr>';
        return;
      }
      body.innerHTML = [...posts].sort((a, b) => (b.views || 0) - (a.views || 0)).map(p => {
        const date = p.timestamp ? new Date(p.timestamp).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) : '—';
        return `<tr>
          <td>
            <div class="summary">${p.messageSummary || '—'}</div>
            <div class="hook">"${p.hookSummary || '—'}"</div>
          </td>
          <td><span class="badge genre">${p.genre || '—'}</span></td>
          <td><span class="mono">${fmtViews(p.views)}</span></td>
          <td><span class="muted" style="font-family:'DM Mono',monospace; font-size:11px">${p.viewRange || '—'}</span></td>
          <td><span class="badge ${p.wol || ''}">${(p.wol || '—').toUpperCase()}</span></td>
          <td><span class="muted">${p.emotionalTone || '—'}</span></td>
          <td><span class="badge ${p.isSponsored ? 'sponsored' : 'organic'}">${p.isSponsored ? 'Paid' : 'Organic'}</span></td>
          <td class="muted">${date}</td>
          <td class="mono">${p.duration ? Math.round(p.duration) + 's' : '—'}</td>
          <td class="muted" style="font-size:11px">${p.ctaPresent ? p.ctaType : 'none'}</td>
          <td>${p.url ? `<a class="ig-link" href="${p.url}" target="_blank">↗ view</a>` : '—'}</td>
        </tr>`;
      }).join('');
    }

    function renderInsights() {
      const posts = allPosts;
      if (!posts.length) return;

      const count = (arr, key) => arr.reduce((acc, p) => { acc[p[key]] = (acc[p[key]] || 0) + 1; return acc; }, {});
      const top = obj => Object.entries(obj).sort((a, b) => b[1] - a[1])[0];

      const genreCounts = count(posts, 'genre');
      const toneCounts = count(posts, 'emotionalTone');
      const winsByGenre = count(posts.filter(p => p.wol === 'win'), 'genre');

      const topGenre = top(genreCounts);
      const topTone = top(toneCounts);
      const bestWinGenre = top(winsByGenre);

      const sp = posts.filter(p => p.isSponsored);
      const og = posts.filter(p => !p.isSponsored);
      const spWinRate = sp.length ? Math.round(sp.filter(p => p.wol === 'win').length / sp.length * 100) : 0;
      const ogWinRate = og.length ? Math.round(og.filter(p => p.wol === 'win').length / og.length * 100) : 0;

      const top5 = [...posts].sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 5);

      // Day of week analysis
      const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const dayWins = {};
      posts.filter(p => p.wol === 'win' && p.timestamp).forEach(p => {
        const d = dayNames[new Date(p.timestamp).getDay()];
        dayWins[d] = (dayWins[d] || 0) + 1;
      });
      const bestDay = top(dayWins);

      document.getElementById('insightsContent').innerHTML = `
        <div class="section-label">Key signals</div>
        <div class="insight-chips">
          ${bestWinGenre ? `<div class="chip">Best genre for wins: <strong>${bestWinGenre[0]}</strong> (${bestWinGenre[1]} wins)</div>` : ''}
          ${topGenre ? `<div class="chip">Most posted genre: <strong>${topGenre[0]}</strong> (${topGenre[1]} reels)</div>` : ''}
          ${topTone ? `<div class="chip">Dominant tone: <strong>${topTone[0]}</strong></div>` : ''}
          ${bestDay ? `<div class="chip">Best posting day: <strong>${bestDay[0]}</strong></div>` : ''}
          <div class="chip">Organic win rate: <strong>${ogWinRate}%</strong></div>
          <div class="chip">Sponsored win rate: <strong>${spWinRate}%</strong></div>
        </div>

        <div class="section-label">Top 5 reels by views</div>
        ${top5.map((p, i) => `
          <div class="top-reel">
            <div class="rank">#${i + 1}</div>
            <div style="flex:1">
              <div class="summary">${p.messageSummary || '—'}</div>
              <div style="display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; align-items:center">
                <span class="badge genre">${p.genre}</span>
                <span class="badge ${p.wol}">${(p.wol || '').toUpperCase()}</span>
                <span class="mono">${fmtViews(p.views)} views</span>
                ${p.url ? `<a class="ig-link" href="${p.url}" target="_blank">↗ view on Instagram</a>` : ''}
              </div>
            </div>
          </div>`).join('')}

        <div style="margin-top:1.5rem">
          <button class="btn" onclick="sendToChat()">Ask Claude for strategic summary →</button>
        </div>`;
    }

    function sendToChat() {
      const summary = {
        creator: creatorData.username,
        followers: creatorData.followersCount,
        totalReels: allPosts.length,
        winRate: Math.round(allPosts.filter(p => p.wol === 'win').length / allPosts.length * 100) + '%',
        topGenres: [...new Set(allPosts.filter(p => p.wol === 'win').map(p => p.genre))].slice(0, 3),
        top3Reels: [...allPosts].sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 3).map(p => p.messageSummary)
      };
      alert('Copy this data and paste it into Claude.ai for a strategic summary:\n\n' + JSON.stringify(summary, null, 2));
    }

    function showTab(name, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-content').style.display = name === 'content' ? 'block' : 'none';
      document.getElementById('tab-insights').style.display = name === 'insights' ? 'block' : 'none';
    }

    function exportCSV() {
      const headers = ['Genre', 'Views', 'View Range', 'Result', 'Tone', 'Format', 'Sponsored', 'Date', 'Duration(s)', 'CTA', 'Message Summary', 'Hook', 'URL'];
      const rows = allPosts.map(p => [
        p.genre, p.views, p.viewRange, p.wol, p.emotionalTone, p.format,
        p.isSponsored ? 'Yes' : 'No',
        p.timestamp ? new Date(p.timestamp).toLocaleDateString() : '',
        p.duration ? Math.round(p.duration) : '',
        p.ctaType,
        (p.messageSummary || '').replace(/,/g, ' '),
        (p.hookSummary || '').replace(/,/g, ' '),
        p.url || ''
      ]);
      const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
      download(csv, `${creatorData.username}_intel.csv`, 'text/csv');
    }

    function exportJSON() {
      download(JSON.stringify({ creator: creatorData, posts: allPosts }, null, 2), `${creatorData.username}_intel.json`, 'application/json');
    }

    function download(content, filename, type) {
      const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(new Blob([content], { type })), download: filename });
      a.click();
    }
  </script>
</body>
</html>
